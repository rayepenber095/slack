apiVersion: v1
kind: ConfigMap
metadata:
  name: slack-clone-config
  namespace: default
data:
  # VULN: Secrets stored in ConfigMap instead of K8s Secrets
  # VULN: ConfigMaps are readable by any pod in the namespace by default
  DB_HOST: "db-service"
  DB_NAME: "slack_clone"
  DB_USER: "slackuser"
  DB_PASS: "slackpass"         # VULN: Password in ConfigMap (plaintext)
  MYSQL_ROOT_PASSWORD: "root"  # VULN: Root DB password in ConfigMap
  JWT_SECRET: "secret123"      # VULN: JWT signing secret in ConfigMap
  ENCRYPTION_KEY: "weakkey123456789"  # VULN: Encryption key in ConfigMap
  INTERNAL_API_KEY: "internal-debug-key-1234"  # VULN
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  # VULN: Debug mode enabled via ConfigMap
  APP_DEBUG: "true"
  PHP_DISPLAY_ERRORS: "1"
  # VULN: Internal network topology exposed
  ADMIN_PORT: "8081"
  WS_PORT: "8080"
